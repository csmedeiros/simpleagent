<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Como um agente de IA funciona</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: #fff;
            color: #111;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 6rem 1.5rem 10rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 0.6rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #888;
            font-weight: 400;
            font-style: italic;
            margin-bottom: 5rem;
        }

        .step {
            margin-bottom: 4rem;
            animation: fadeIn 0.4s ease;
        }

        .step + .step { border-top: 1px solid #e0e0e0; padding-top: 4rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-label {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #aaa;
            margin-bottom: 1rem;
        }

        .step h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            line-height: 1.2;
        }

        .step p {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .step p strong { color: #111; }
        .step p code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            padding: 0.1em 0.4em;
            border-radius: 3px;
            font-size: 0.85em;
            color: #333;
        }

        /* Code */
        .code-block {
            border-radius: 8px;
            overflow: hidden;
            margin: 1.5rem 0;
            border: 1px solid #e0e0e0;
        }

        .code-label {
            background: #fafafa;
            padding: 0.4rem 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #e0e0e0;
        }

        .code-block pre {
            margin: 0;
            padding: 1.2rem 1.3rem;
            background: #1a1a1a;
            overflow-x: auto;
        }

        .code-block code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82rem;
            line-height: 1.65;
        }

        /* Boxes */
        .box {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.2rem 1.4rem;
            margin: 1.5rem 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        .box .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            margin-bottom: 0.5rem;
        }

        .box .content { color: #333; font-size: 1rem; line-height: 1.7; }
        .box .dim { color: #aaa; font-size: 0.85rem; }

        /* Callout */
        .callout {
            border-left: 3px solid #111;
            padding: 1rem 1.3rem;
            margin: 2rem 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            color: #555;
            font-size: 1rem;
            line-height: 1.7;
        }

        .callout strong { color: #111; }

        /* Diagram */
        .diagram {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.88rem;
            line-height: 2.2;
            color: #888;
        }

        .diagram b { color: #111; }

        /* History */
        .history-msg {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }
        .history-msg:last-child { border-bottom: none; }
        .history-role {
            min-width: 110px;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            padding-top: 0.2rem;
        }
        .history-body { color: #555; flex: 1; word-break: break-word; }

        /* Button */
        .btn-next {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2.2rem;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-next:hover { background: #333; }

        /* Progress */
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #111;
            transition: width 0.4s ease;
            z-index: 100;
        }

        .step-counter {
            position: fixed;
            top: 14px;
            right: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: #bbb;
            z-index: 100;
        }

        .hidden { display: none; }

        @media (max-width: 640px) {
            .container { padding: 3rem 1.2rem 6rem; }
            h1 { font-size: 2.4rem; }
            .step h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="progress" id="progress"></div>
    <div class="step-counter" id="step-counter"></div>

    <div class="container">
        <h1>Como um agente de IA funciona</h1>
        <p class="subtitle">Passo a passo, sem frameworks.</p>

        <div id="steps-container"></div>
    </div>

    <script>
    const STEPS = [

    // INTRO
    {
        render: () => `
            <h2>Um agente é um loop.</h2>
            <p>
                Um LLM sozinho só recebe texto e devolve texto. Não acessa a internet, não faz cálculos.
                Mas se você der a ele <strong>ferramentas</strong> e um <strong>loop de decisão</strong>,
                ele vira um agente.
            </p>
            <div class="diagram">
                <b>Usuário pergunta</b><br>
                ↓<br>
                <b>LLM analisa</b> (histórico + tools)<br>
                ↓<br>
                Responde direto? → <b>Fim</b><br>
                Quer chamar tool? → Executa → resultado volta → <b>LLM analisa de novo</b><br>
                ↓<br>
                <em>...repete até ter resposta final</em>
            </div>
            <p>Isso se chama <strong>ReAct</strong> (Reasoning and Acting). Vamos construir passo a passo.</p>
        `
    },

    // 1
    {
        render: () => `
            <div class="step-label">Passo 1 de 10</div>
            <h2>A pergunta</h2>
            <div class="box">
                <div class="label">Input do usuário</div>
                <div class="content">"Quanto é 42 × 17? E o que é Python?"</div>
            </div>
            <p>Duas partes: um cálculo e uma busca por informação. O LLM vai decidir como resolver cada uma.</p>
        `
    },

    // 2
    {
        render: () => `
            <div class="step-label">Passo 2 de 10</div>
            <h2>O system prompt</h2>
            <p>Instruções que dizem ao LLM como se comportar e que ele tem ferramentas disponíveis.</p>
            ${codeBlock('python', `system_prompt = "Você é um assistente que usa ferramentas quando necessário. Seja conciso."`)}
        `
    },

    // 3
    {
        render: () => `
            <div class="step-label">Passo 3 de 10</div>
            <h2>As ferramentas</h2>
            <p>Funções Python normais, descritas em JSON Schema para o LLM entender o que fazem.</p>
            ${codeBlock('python', `def calcular(operacao: str, a: float, b: float) -> float:
    """Faz um cálculo matemático."""
    ops = {"soma": a + b, "subtracao": a - b,
           "multiplicacao": a * b, "divisao": a / b}
    return ops.get(operacao)

def buscar_informacao(topico: str) -> str:
    """Busca informações sobre um tópico."""
    return pesquisar(topico)`)}
            <p>O JSON Schema descreve nome, descrição e parâmetros de cada função. É isso que o LLM vê.</p>
            <div class="callout">
                <strong>O LLM não executa nada.</strong> Ele só vê a descrição e decide se quer chamar. Quem executa somos nós.
            </div>
        `
    },

    // 4
    {
        render: () => `
            <div class="step-label">Passo 4 de 10</div>
            <h2>O histórico de mensagens</h2>
            <p>A API funciona com uma lista de mensagens. Começamos com duas:</p>
            ${codeBlock('python', `messages = [
    {"role": "system", "content": system_prompt},
    {"role": "user", "content": "Quanto é 42 * 17? E o que é Python?"},
]`)}
            <p>Essa lista vai <strong>crescer</strong> a cada iteração. O LLM sempre recebe o histórico completo.</p>
        `
    },

    // 5
    {
        render: () => `
            <div class="step-label">Passo 5 de 10</div>
            <h2>Iteração 1 — chamando o LLM</h2>
            <p>Enviamos o histórico e as ferramentas disponíveis:</p>
            ${codeBlock('python', `response = client.responses.create(
    model="gpt-4o",
    input=messages,
    tools=tools,
)`)}
            <p>O LLM analisa tudo e decide: responder direto ou pedir ferramentas.</p>
        `
    },

    // 6
    {
        render: () => `
            <div class="step-label">Passo 6 de 10</div>
            <h2>O LLM pediu ferramentas</h2>
            <p>Ao invés de responder com texto, o <code>response.output</code> veio com <strong>tool calls</strong>. Este é o retorno real da API:</p>
            ${codeBlock('python', `# response.output retornado pela API
[
    ResponseFunctionToolCall(
        type="function_call",
        name="calcular",
        arguments='{"operacao": "multiplicacao", "a": 42, "b": 17}',
        call_id="call_abc123",
        id="fc_abc123",
        status="completed",
    ),
    ResponseFunctionToolCall(
        type="function_call",
        name="buscar_informacao",
        arguments='{"topico": "Python"}',
        call_id="call_def456",
        id="fc_def456",
        status="completed",
    ),
]`)}
            <p>Filtramos os items do tipo <code>function_call</code>:</p>
            ${codeBlock('python', `tool_calls = [item for item in response.output
              if item.type == "function_call"]

# tool_calls[0].name       → "calcular"
# tool_calls[0].arguments  → '{"operacao": "multiplicacao", "a": 42, "b": 17}'
# tool_calls[0].call_id    → "call_abc123"`)}
            <div class="callout">
                <strong>Momento chave.</strong> O LLM não executou nada — a API retornou objetos dizendo quais funções ele quer chamar e com quais argumentos.
                Os <code>arguments</code> são uma string JSON que precisamos parsear. O <code>call_id</code> pareia cada chamada com seu resultado depois.
            </div>
        `
    },

    // 7
    {
        render: () => `
            <div class="step-label">Passo 7 de 10</div>
            <h2>Executando as ferramentas</h2>
            <p>Nós parseamos os argumentos e chamamos as funções:</p>
            ${codeBlock('python', `for tool_call in tool_calls:
    args = json.loads(tool_call.arguments)
    result = tools_map[tool_call.name](**args)`)}
            <div class="box">
                <div class="label">calcular</div>
                <div class="content">multiplicacao(42, 17) → <strong>714</strong></div>
            </div>
            <div class="box">
                <div class="label">buscar_informacao</div>
                <div class="content">"Python" → <strong>"Linguagem criada por Guido van Rossum em 1991."</strong></div>
            </div>
        `
    },

    // 8
    {
        render: () => `
            <div class="step-label">Passo 8 de 10</div>
            <h2>Resultados voltam ao histórico</h2>
            <p>Adicionamos as tool calls e seus resultados. O <code>call_id</code> conecta cada par:</p>
            ${codeBlock('python', `messages.append({"type": "function_call", "call_id": "call_abc123", ...})
messages.append({"type": "function_call_output", "call_id": "call_abc123", "output": "714"})`)}
            <div class="box">
                <div class="label">Histórico — 6 mensagens</div>
                <div class="content">
                    <div class="history-msg"><span class="history-role">system</span><span class="history-body">Você é um assistente que usa ferramentas...</span></div>
                    <div class="history-msg"><span class="history-role">user</span><span class="history-body">Quanto é 42 × 17? E o que é Python?</span></div>
                    <div class="history-msg"><span class="history-role">tool call</span><span class="history-body">calcular(multiplicacao, 42, 17)</span></div>
                    <div class="history-msg"><span class="history-role">tool output</span><span class="history-body">714</span></div>
                    <div class="history-msg"><span class="history-role">tool call</span><span class="history-body">buscar_informacao("Python")</span></div>
                    <div class="history-msg"><span class="history-role">tool output</span><span class="history-body">Linguagem criada por Guido van Rossum em 1991.</span></div>
                </div>
            </div>
        `
    },

    // 9
    {
        render: () => `
            <div class="step-label">Passo 9 de 10</div>
            <h2>Iteração 2 — resposta final</h2>
            <p>O LLM recebe o histórico completo com os resultados. Agora tem informação suficiente:</p>
            ${codeBlock('python', `response = client.responses.create(
    model="gpt-4o",
    input=messages,  # 6 mensagens agora
    tools=tools,
)`)}
            <div class="box">
                <div class="label">Resposta do LLM</div>
                <div class="content">
                    42 × 17 = <strong>714</strong>.<br><br>
                    <strong>Python</strong> é uma linguagem de programação criada por Guido van Rossum em 1991.
                </div>
            </div>
            <p>Retornou <strong>texto</strong>, não tool calls. O loop terminou.</p>
        `
    },

    // 10
    {
        render: () => `
            <div class="step-label">Passo 10 de 10</div>
            <h2>Isso é um agente.</h2>
            <p>O código completo:</p>
            ${codeBlock('python', `import openai, json

client = openai.Client(api_key="...")

messages = [
    {"role": "system", "content": system_prompt},
    {"role": "user", "content": user_input},
]

for iteration in range(max_iterations):
    response = client.responses.create(
        model="gpt-4o",
        input=messages,
        tools=tools,
    )

    tool_calls = [item for item in response.output
                  if item.type == "function_call"]

    if tool_calls:
        for tc in tool_calls:
            result = tools_map[tc.name](**json.loads(tc.arguments))
            messages.append({"type": "function_call", ...})
            messages.append({"type": "function_call_output", ...})
    else:
        print(response.output[0].content)
        break`)}
            <div class="callout">
                <strong>A autonomia está no loop.</strong> O LLM decide sozinho se precisa de mais informação
                ou se já pode responder. Pode ser 1, 2 ou 20 iterações — depende da tarefa.
                É isso que torna o agente autônomo.
            </div>
            <div class="diagram" style="text-align:left">
                <b>Iteração 1:</b> User pergunta → LLM pede 2 tools → Executamos → Resultado volta<br>
                <b>Iteração 2:</b> LLM vê resultados → Responde → Fim ✓<br><br>
                Em tarefas complexas, o agente pode fazer dezenas de iterações,<br>
                chamando ferramentas diferentes a cada passo.
            </div>
            <p>
                A implementação completa está em <code>simpleagent/agents/base.py</code>.
            </p>
            <div style="margin-top:2rem">
                <button class="btn-next" onclick="location.reload()">Recomeçar</button>
            </div>
        `
    },

    ];

    let currentStep = 0;
    const totalSteps = STEPS.length;

    function codeBlock(lang, code) {
        const highlighted = hljs.highlight(code, { language: lang }).value;
        const label = lang === 'python' ? 'Python' : 'JSON';
        return `<div class="code-block">
            <div class="code-label">${label}</div>
            <pre><code class="hljs language-${lang}">${highlighted}</code></pre>
        </div>`;
    }
    window.codeBlock = codeBlock;

    function updateProgress() {
        const pct = ((currentStep + 1) / totalSteps) * 100;
        document.getElementById('progress').style.width = pct + '%';
        if (currentStep > 0) {
            document.getElementById('step-counter').textContent = `${currentStep} / ${totalSteps - 1}`;
            document.getElementById('step-counter').classList.remove('hidden');
        } else {
            document.getElementById('step-counter').classList.add('hidden');
        }
    }

    function renderStep() {
        const container = document.getElementById('steps-container');
        const step = STEPS[currentStep];
        const div = document.createElement('div');
        div.className = 'step';
        div.innerHTML = step.render();

        if (currentStep < totalSteps - 1) {
            const btnDiv = document.createElement('div');
            btnDiv.innerHTML = `<button class="btn-next" onclick="nextStep()">
                ${currentStep === 0 ? 'Começar' : 'Entendi, próximo passo'} →
            </button>`;
            div.appendChild(btnDiv);
        }

        container.appendChild(div);
        updateProgress();
        if (currentStep > 0) div.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function nextStep() {
        const btns = document.querySelectorAll('.btn-next');
        const lastBtn = btns[btns.length - 1];
        if (lastBtn) { lastBtn.disabled = true; lastBtn.style.opacity = '0.2'; lastBtn.style.cursor = 'default'; }
        currentStep++;
        if (currentStep < totalSteps) renderStep();
    }

    renderStep();
    </script>
</body>
</html>
